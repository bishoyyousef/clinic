<div class="login-wrapper">
  <!-- Brand Header overlay context -->
  <div class="login-container">
    <div class="login-card">
      <div class="card-header">
        <div class="logo">
          <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
          </svg>
        </div>
        <h1>Clarity Clinic</h1>
        <p class="subtitle">Staff Portal Access</p>
      </div>

      <!-- Error Message Banner -->
      <div class="error-banner" *ngIf="errorMessage()">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" class="error-icon">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>

      <!-- Login Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <!-- Email Input Group -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper" [class.error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
            <input 
              id="email" 
              type="email" 
              formControlName="email" 
              placeholder="name@clinic.com" 
              [attr.disabled]="isLoading() ? true : null"
              autocomplete="email"
            />
            <span class="input-icon">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
            </span>
          </div>
          <div class="validation-message" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required.</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email address.</span>
          </div>
        </div>

        <!-- Password Input Group -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper" [class.error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            <input 
              id="password" 
              [type]="showPassword() ? 'text' : 'password'" 
              formControlName="password" 
              placeholder="••••••••" 
              [attr.disabled]="isLoading() ? true : null"
              autocomplete="current-password"
            />
            <span class="input-icon">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </span>
            <!-- Password visibility toggle button -->
            <button 
              type="button" 
              class="password-toggle" 
              (click)="togglePasswordVisibility()" 
              [attr.disabled]="isLoading() ? true : null"
              aria-label="Toggle password visibility"
            >
              <svg *ngIf="showPassword()" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
              <svg *ngIf="!showPassword()" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <div class="validation-message" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</span>
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</span>
          </div>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="submit-btn" 
          [class.loading]="isLoading()"
          [disabled]="isLoading() || loginForm.invalid"
        >
          <!-- Spinner icon -->
          <svg *ngIf="isLoading()" class="spinner" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="3" fill="none">
            <circle cx="12" cy="12" r="10" stroke-dasharray="40" stroke-dashoffset="10"></circle>
          </svg>
          <span>{{ isLoading() ? 'Signing in...' : 'Sign In' }}</span>
        </button>
      </form>
    </div>
  </div>
</div>
