<header class="header">
  <!-- Mobile Menu Trigger -->
  <button class="mobile-toggle" (click)="toggleMobileSidebar.emit()" aria-label="Open menu">
    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>

  <!-- Page Title / Branding Context -->
  <div class="header-title">
    <h2>Dashboard</h2>
  </div>

  <!-- Header Actions area -->
  <div class="header-actions">
    <!-- Language Toggle -->
    <button class="action-btn lang-toggle" (click)="langService.toggleLanguage()" [attr.aria-label]="langService.currentLang() === 'en' ? 'Switch to Arabic' : 'Switch to English'">
      <span class="lang-text">{{ langService.currentLang() === 'en' ? 'AR' : 'EN' }}</span>
    </button>

    <!-- Theme Toggle -->
    <button class="action-btn theme-toggle" (click)="themeService.toggleTheme()" aria-label="Toggle theme">
      <!-- Sun icon shown in Dark Mode -->
      <svg *ngIf="themeService.theme() === 'dark'" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <!-- Moon icon shown in Light Mode -->
      <svg *ngIf="themeService.theme() === 'light'" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>

    <!-- Divider -->
    <span class="separator"></span>

    <!-- Profile Action trigger -->
    <div class="profile-trigger">
      <div class="user-avatar-small">A</div>
    </div>
  </div>
</header>
